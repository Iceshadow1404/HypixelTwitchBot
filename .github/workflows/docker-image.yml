name: Build and Push to GHCR

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check bot tests

      - name: Type check
        run: uv run pyrefly check

      - name: Tests
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER/hypixelskyblock"
          if [ "$BRANCH_NAME" = "master" ]; then
            echo "tags=$IMAGE:latest,$IMAGE:$COMMIT_SHA" >> $GITHUB_OUTPUT
          else
            SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr -c 'a-zA-Z0-9._\n' '-' | tr '[:upper:]' '[:lower:]')
            echo "tags=$IMAGE:$SAFE_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
